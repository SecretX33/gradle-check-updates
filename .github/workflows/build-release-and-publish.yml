name: Build, Release & Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3 or v1.2.3). Leave empty to auto-increment patch from latest tag.'
        required: false
        type: string
      dry_run:
        description: 'If true, runs npm publish --dry-run (no actual publish).'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  release:
    if: github.repository == 'SecretX33/gradle-check-updates'
    uses: ./.github/workflows/build-and-release.yml
    with:
      version: ${{ inputs.version }}

  publish:
    if: github.repository == 'SecretX33/gradle-check-updates'
    needs: release
    uses: ./.github/workflows/publish.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
      dry_run: ${{ inputs.dry_run }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-docs:
    if: github.repository == 'SecretX33/gradle-check-updates' && inputs.dry_run != true
    needs: [release, publish]
    uses: ./.github/workflows/deploy-docs.yml
