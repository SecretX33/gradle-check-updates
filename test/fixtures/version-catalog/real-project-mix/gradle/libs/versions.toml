[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-spring = { id = "org.jetbrains.kotlin.plugin.spring", version.ref = "kotlin" }
kotlin-jpa = { id = "org.jetbrains.kotlin.plugin.jpa", version.ref = "kotlin" }
kotlin-noarg = { id = "org.jetbrains.kotlin.plugin.noarg", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
kotlin-allopen = { id = "org.jetbrains.kotlin.plugin.allopen", version.ref = "kotlin" }
spring-boot = { id = "org.springframework.boot", version.ref = "spring-boot" }
spring-dependency-management = { id = "io.spring.dependency-management", version.ref = "spring-dependency-management" }

[bundles]
kotlin-core = ["kotlin-stdlib", "kotlin-reflect"]
kotlin-coroutines = ["kotlinx-coroutines-core", "kotlinx-coroutines-slf4j", "kotlinx-coroutines-reactor"]
jackson = ["jackson-module-kotlin", "jackson-module-jakarta-xmlbind", "jackson-datatype-jsr310", "jackson-databind"]
google-maps = ["google-maps-services", "google-maps-places", "google-maps-routing"]
jwt = ["jwt", "jwt-impl", "jwt-jackson", "jwt-api"]
monitoring = ["micrometer-core", "micrometer-registry-otlp", "opentelemetry-api", "opentelemetry-sdk", "opentelemetry-micrometer", "opentelemetry-extension-kotlin"]
langchain4j = [
    "langchain4j-core",
    "langchain4j-anthropic",
    "langchain4j-openai",
    "langchain4j-vertex-ai",
    "langchain4j-vertex-ai-gemini",
    "langchain4j-google-ai-gemini",
